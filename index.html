<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=1.0"/>
  <title>TV Ao Vivo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --red:#e8001c;--yellow:#ffd100;
      --dark:#090909;--surf:#111;--surf2:#181818;--surf3:#222;
      --border:rgba(255,255,255,0.07);--text:#f0f0f0;--muted:#555;
      --menu-w:300px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* HEADER */
    header{
      position:fixed;top:0;left:0;right:0;z-index:300;
      background:rgba(9,9,9,.98);border-bottom:1px solid var(--border);
      height:52px;padding:0 14px;display:flex;align-items:center;gap:12px;
    }
    .menu-btn{
      background:none;border:none;cursor:pointer;
      display:flex;flex-direction:column;gap:5px;padding:6px;flex-shrink:0;
    }
    .menu-btn span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s;transform-origin:center;}
    .menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .menu-btn.open span:nth-child(2){opacity:0;}
    .menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .app-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:#fff;flex-shrink:0;}
    .app-logo span{color:var(--red);}
    .live-pill{
      display:flex;align-items:center;gap:5px;
      background:rgba(232,0,28,.12);border:1px solid rgba(232,0,28,.3);
      padding:3px 9px;border-radius:20px;
      font-size:10px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase;flex-shrink:0;
    }
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.6);}}
    .hdr-spacer{flex:1;}
    .now-ch-badge{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}

    /* CHANNEL MENU */
    .menu-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .3s;}
    .menu-overlay.open{opacity:1;pointer-events:all;}
    .ch-menu{
      position:fixed;top:0;left:0;bottom:0;z-index:260;width:var(--menu-w);
      background:var(--surf);border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    }
    .ch-menu.open{transform:translateX(0);}
    .ch-menu-hdr{
      padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .ch-menu-hdr::before{content:'';display:block;width:3px;height:16px;background:var(--red);border-radius:2px;}
    .ch-menu-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--muted);}
    .ch-list{flex:1;overflow-y:auto;padding:8px 0;}
    .ch-list::-webkit-scrollbar{width:4px;}
    .ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .ch-item{
      display:flex;align-items:center;gap:14px;padding:13px 16px;
      cursor:pointer;border-left:3px solid transparent;
      transition:background .18s;border-bottom:1px solid var(--border);
    }
    .ch-item:hover{background:var(--surf2);}
    .ch-item.active{background:rgba(232,0,28,.08);border-left-color:var(--red);}
    .ch-badge{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;text-align:center;line-height:1.2;padding:4px;flex-shrink:0;}
    .ch-item-info{flex:1;min-width:0;}
    .ch-item-info h3{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ch-item-info p{font-size:11px;color:var(--muted);margin-top:2px;}
    .ch-num-tag{font-size:11px;font-weight:700;color:var(--muted);background:var(--surf3);padding:3px 7px;border-radius:4px;flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
    .ch-item.active .ch-num-tag{background:var(--red);color:#fff;}

    /* LAYOUT */
    .app{padding-top:52px;display:grid;grid-template-columns:1fr;min-height:100vh;}
    .player-zone{display:flex;flex-direction:column;}

    /* PLAYER */
    .player-wrap{position:relative;background:#000;aspect-ratio:16/9;width:100%;overflow:hidden;}
    #video{width:100%;height:100%;display:block;background:#000;}
    .player-overlay{
      position:absolute;inset:0;
      opacity:0;
      transition:opacity .4s;
      background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 55%);
      display:flex;flex-direction:column;justify-content:flex-end;padding:13px;
      cursor:pointer;
    }
    .player-overlay.visible{opacity:1;}
    .controls{display:flex;align-items:center;gap:9px;}
    .ctrl-btn{
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);
      border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:#fff;font-size:16px;transition:background .2s,transform .15s;
      backdrop-filter:blur(6px);flex-shrink:0;
    }
    .ctrl-btn:hover{background:var(--red);transform:scale(1.1);}
    .vol-slider{-webkit-appearance:none;appearance:none;width:65px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;outline:none;cursor:pointer;}
    .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--yellow);cursor:pointer;}
    .flex1{flex:1;}
    .hd-tag{background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:3px;text-transform:uppercase;}



    /* BANNER NOME DO CANAL */
    .ch-banner{
      position:absolute;top:14px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.72);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.12);border-radius:12px;
      padding:8px 18px;display:flex;align-items:center;gap:10px;
      opacity:0;transition:opacity .4s;pointer-events:none;
      white-space:nowrap;z-index:11;
    }
    .ch-banner.visible{opacity:1;}
    .ch-banner-num{
      font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
      color:var(--yellow);line-height:1;
    }
    .ch-banner-sep{width:1px;height:28px;background:rgba(255,255,255,.2);}
    .ch-banner-icon{font-size:20px;line-height:1;}
    .ch-banner-name{
      font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
      color:#fff;line-height:1;
    }
    /* SETAS DE CANAL */
    .nav-arrow{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);
      border-radius:50%;width:52px;height:52px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:#fff;font-size:22px;
      backdrop-filter:blur(8px);
      transition:background .2s,transform .15s;
      z-index:10;flex-shrink:0;
    }
    .nav-arrow:hover{background:var(--red);transform:translateY(-50%) scale(1.1);}
    .nav-prev{left:12px;}
    .nav-next{right:12px;}
    /* LOADING */
    .status-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);}
    .spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .status-text{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;font-weight:600;}

    /* CHANNEL INFO */
    .channel-info{padding:15px 17px;background:var(--surf);border-bottom:1px solid var(--border);}
    .ch-header{display:flex;align-items:center;gap:13px;margin-bottom:11px;}
    .ch-logo-box{width:50px;height:50px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;text-align:center;line-height:1.2;padding:5px;border:1px solid var(--border);}
    .ch-meta h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1;color:#fff;}
    .ch-meta p{font-size:12px;color:var(--muted);margin-top:3px;}
    .on-air{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:rgba(232,0,28,.1);border:1px solid rgba(232,0,28,.3);padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;color:var(--red);letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;}

    

    /* TOAST */
    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:680px){
      .app{grid-template-columns:1fr;padding-bottom:16px;}
      :root{--menu-w:280px;}
    }
  </style>
</head>
<body>

<header>
  <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <div class="app-logo">TV<span>•</span>LIVE</div>
  <div class="live-pill"><div class="live-dot"></div>Ao Vivo</div>
  <div class="hdr-spacer"></div>
  <span id="tokenStatus" style="font-size:11px;color:var(--muted);letter-spacing:1px;flex-shrink:0;"></span>
  <span class="now-ch-badge" id="headerChName"></span>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="ch-menu" id="chMenu">
  <div class="ch-menu-hdr"><h2>Canais</h2></div>
  <div class="ch-list" id="chList"></div>
</div>

<div class="app">
  <div class="player-zone">
    <div class="player-wrap" id="playerWrap">
      <video id="video" playsinline></video>
      <div class="status-overlay" id="statusOverlay">
        <div class="spinner"></div>
        <span class="status-text" id="statusTxt">Carregando sinal...</span>
      </div>
      <div class="player-overlay" id="playerOverlay">
        <div class="ch-banner" id="chBanner"><span class="ch-banner-num" id="bannerNum"></span><div class="ch-banner-sep"></div><span class="ch-banner-name" id="bannerName"></span></div>
        <button class="nav-arrow nav-prev" onclick="prevChannel(event)" title="Canal anterior">&#10094;</button>
        <button class="nav-arrow nav-next" onclick="nextChannel(event)" title="Próximo canal">&#10095;</button>
        <div class="controls">
          <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
          <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">&#128266;</button>
          <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)"/>
          <div class="flex1"></div>
          <span class="hd-tag">HD</span>
          <button class="ctrl-btn" onclick="castToTV()" title="Transmitir para TV">&#128253;</button>
          <button class="ctrl-btn" onclick="mirrorScreen()" title="Espelhar tela">&#128227;</button>
          <button class="ctrl-btn" onclick="toggleFS()">&#9633;</button>
        </div>
      </div>
    </div>

    <div class="channel-info">
      <div class="ch-header">
        <div class="ch-logo-box" id="chLogoBox"></div>
        <div class="ch-meta">
          <h1 id="chName">-</h1>
          <p id="chDesc"></p>
        </div>
        <div class="on-air"><div class="live-dot"></div>On Air</div>
      </div>
    </div>
  </div>
</div>

<!-- CAST MODAL -->
<div id="castModal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;">
  <div style="background:#181818;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px;width:100%;max-width:360px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;">&#128250; TRANSMITIR PARA TV</span>
      <button onclick="closeCast()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;">&#10005;</button>
    </div>
    <div onclick="castWebVideoCast()" style="display:flex;align-items:center;gap:14px;padding:16px;background:rgba(255,255,255,.06);border-radius:14px;cursor:pointer;border:1px solid rgba(255,255,255,.12);active:background:rgba(255,255,255,.12);">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,#e91e63,#9c27b0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">&#128225;</div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:700;color:#fff;">Compartilhar para TV</div>
        <div style="font-size:12px;color:#aaa;margin-top:3px;">Toca aqui → escolha Web Video Cast</div>
      </div>
      <span style="font-size:22px;color:#555;">&#10095;</span>
    </div>
  </div>
</div>

/* ── STATE ── */
var curIdx = 0;
var menuOpen = false;

/* ── HLS PLAYER ── */
var hls = null;

function playChannel(idx) {
  curIdx = idx;

  // Destroi HLS anterior
  if (hls !== null) {
    hls.destroy();
    hls = null;
  }

  var ch = CHANNELS[idx];
  var video = document.getElementById("video");
  var statusOverlay = document.getElementById("statusOverlay");
  var statusTxt = document.getElementById("statusTxt");

  // Mostra loading
  statusOverlay.style.display = "flex";
  statusOverlay.style.opacity = "1";
  statusTxt.textContent = "Carregando sinal...";

  // Atualiza UI
  updateUI(ch);
  showOverlayControls();

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play().catch(function(){});
      statusOverlay.style.transition = "opacity .5s";
      statusOverlay.style.opacity = "0";
      setTimeout(function(){ statusOverlay.style.display = "none"; }, 500);
    });
    hls.on(Hls.Events.ERROR, function(event, data) {
      if (data.fatal) {
        statusTxt.textContent = "Erro no sinal. Renovando token...";
        // Tenta renovar o token antes de retocar
        var ch = CHANNELS[curIdx];
        var slug = ch.id || _slugFromUrl(ch.url);
        _fetchTok(slug, curIdx).then(function(ok) {
          setTimeout(function(){
            if(hls){ hls.destroy(); hls = null; }
            playChannel(curIdx);
          }, ok ? 500 : 4000);
        }).catch(function(){
          setTimeout(function(){
            if(hls){ hls.destroy(); hls = null; }
            playChannel(curIdx);
          }, 4000);
        });
      }
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = ch.url;
    video.addEventListener("loadedmetadata", function() {
      video.play();
      statusOverlay.style.opacity = "0";
      setTimeout(function(){ statusOverlay.style.display = "none"; }, 500);
    }, { once: true });
  }
}


/* ── BANNER NOME DO CANAL ── */
var bannerTimer = null;
function showChannelBanner(ch) {
  var banner = document.getElementById("chBanner");
  document.getElementById("bannerNum").textContent = ch.num;
  document.getElementById("bannerName").textContent = ch.name;
  banner.classList.add("visible");
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(function() {
    banner.classList.remove("visible");
  }, 5000);
}

/* ── UI ── */
function updateUI(ch) {
  var lb = document.getElementById("chLogoBox");
  lb.textContent = ch.short;
  lb.style.background = ch.color;
  lb.style.color = ch.text;
  document.getElementById("chName").textContent = ch.name;
  document.getElementById("chDesc").textContent = ch.desc;
  document.getElementById("headerChName").textContent = ch.num + " • " + ch.name;
  showChannelBanner(ch);
  buildChList();
}

/* ── CHANNEL LIST ── *//* ── CHANNEL LIST ── */
function buildChList() {
  var list = document.getElementById("chList");
  list.innerHTML = "";
  CHANNELS.forEach(function(ch, i) {
    var div = document.createElement("div");
    div.className = "ch-item" + (i === curIdx ? " active" : "");
    div.innerHTML =
      "<div class=\"ch-badge\" style=\"background:"+ch.color+";color:"+ch.text+"\">"+ch.short+"</div>"+
      "<div class=\"ch-item-info\"><h3>"+ch.name+"</h3><p>"+ch.desc+"</p></div>"+
      "<span class=\"ch-num-tag\">"+ch.num+"</span>";
    div.onclick = (function(idx){
      return function(){
        toggleMenu();
        playChannel(idx);
      };
    })(i);
    list.appendChild(div);
  });
}

/* ── MENU ── */
window.toggleMenu = function() {
  menuOpen = !menuOpen;
  document.getElementById("menuBtn").classList.toggle("open", menuOpen);
  document.getElementById("menuOverlay").classList.toggle("open", menuOpen);
  document.getElementById("chMenu").classList.toggle("open", menuOpen);
};

/* ── AUTO-HIDE CONTROLS ── */
var hideTimer = null;
var overlayVisible = true;

function showOverlayControls() {
  var ov = document.getElementById("playerOverlay");
  ov.classList.add("visible");
  overlayVisible = true;
  clearTimeout(hideTimer);
  // Mostra o banner do canal junto com os controles
  var ch = CHANNELS[curIdx];
  if (ch) showChannelBanner(ch);
  hideTimer = setTimeout(function() {
    ov.classList.remove("visible");
    overlayVisible = false;
  }, 5000);
}

function hideOverlayControls() {
  clearTimeout(hideTimer);
  document.getElementById("playerOverlay").classList.remove("visible");
  overlayVisible = false;
}

document.getElementById("playerWrap").addEventListener("click", function(e) {
  if (e.target.closest(".ctrl-btn") || e.target.closest(".vol-slider") || e.target.closest(".nav-arrow")) return;
  if (overlayVisible) {
    hideOverlayControls();
  } else {
    showOverlayControls();
  }
});


/* ── NAVEGAÇÃO POR SETAS ── */
window.prevChannel = function(e) {
  if (e) e.stopPropagation();
  var idx = (curIdx - 1 + CHANNELS.length) % CHANNELS.length;
  playChannel(idx);
  showOverlayControls();
};
window.nextChannel = function(e) {
  if (e) e.stopPropagation();
  var idx = (curIdx + 1) % CHANNELS.length;
  playChannel(idx);
  showOverlayControls();
};

/* ── ESPELHAR TELA (Presentation API / Screen Cast nativo) ── */
window.mirrorScreen = function() {
  // Tenta Presentation API (funciona em TVs com Chromecast/WiDi/Miracast via Chrome)
  if (navigator.presentation && navigator.presentation.defaultRequest) {
    navigator.presentation.defaultRequest.start().catch(function(){});
    return;
  }
  // Tenta requestPictureInPicture no video
  var vid = document.getElementById("video");
  if (document.pictureInPictureEnabled && !document.pictureInPictureElement) {
    vid.requestPictureInPicture().catch(function(){});
    showToast("Picture-in-Picture ativado");
    return;
  }
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture();
    return;
  }
  // Fallback: compartilha a URL via Web Share API
  var ch = CHANNELS[curIdx];
  if (navigator.share) {
    navigator.share({
      title: ch.name + " - Ao Vivo",
      url: ch.url
    }).catch(function(){});
  } else {
    showToast("Use o menu Cast do seu navegador para transmitir");
  }
};

/* ── CAST / TRANSMITIR ── */
var castSession = null;

window.castToTV = function() {
  var modal = document.getElementById("castModal");
  modal.style.display = "flex";
  showOverlayControls();
  // Tenta inicializar Google Cast se disponível
  initGoogleCast();
};

window.closeCast = function() {
  document.getElementById("castModal").style.display = "none";
};

// Fecha modal clicando fora
document.getElementById("castModal").addEventListener("click", function(e) {
  if (e.target === this) closeCast();
});

function getCurrentStreamUrl() {
  return CHANNELS[curIdx].url;
}

// ── GOOGLE CAST (Chromecast / Android TV) ──
function initGoogleCast() {
  if (typeof chrome !== "undefined" && chrome.cast && chrome.cast.isAvailable) {
    document.getElementById("castGoogleStatus").textContent = "Disponível";
    document.getElementById("castGoogleStatus").style.color = "#4caf50";
  } else {
    // Tenta carregar SDK do Cast
    if (!document.getElementById("castScript")) {
      var s = document.createElement("script");
      s.id = "castScript";
      s.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
      s.onload = function() {
        window.__onGCastApiAvailable = function(isAvailable) {
          if (isAvailable) {
            document.getElementById("castGoogleStatus").textContent = "Pronto";
            document.getElementById("castGoogleStatus").style.color = "#4caf50";
          }
        };
      };
      document.head.appendChild(s);
    }
  }
}

window.castGoogle = function() {
  // Tenta usar Cast API nativa
  if (typeof cast !== "undefined" && cast.framework) {
    var ctx = cast.framework.CastContext.getInstance();
    ctx.requestSession().then(function() {
      var session = ctx.getCurrentSession();
      var mediaInfo = new chrome.cast.media.MediaInfo(getCurrentStreamUrl(), "application/x-mpegURL");
      var request = new chrome.cast.media.LoadRequest(mediaInfo);
      session.loadMedia(request).then(function() {
        showToast("Transmitindo para TV!");
        closeCast();
      }).catch(function(e) { showToast("Erro ao transmitir: "+e); });
    }).catch(function() { showToast("Nenhum dispositivo Cast encontrado"); });
  } else {
    // Fallback: instrução manual
    showToast("Abra o menu do Chrome > Transmitir");
    closeCast();
    // Tenta abrir menu de cast do navegador
    if (navigator.presentation && navigator.presentation.requestSession) {
      navigator.presentation.requestSession(new PresentationRequest([getCurrentStreamUrl()]));
    }
  }
};

// ── AIRPLAY (Safari / iOS) ──
window.castAirPlay = function() {
  var vid = document.getElementById("video");
  if (vid.webkitShowPlaybackTargetPicker) {
    vid.webkitShowPlaybackTargetPicker();
    closeCast();
  } else {
    showToast("AirPlay não disponível neste navegador");
  }
};

// ── COMPARTILHAR LINK DO STREAM ──
window.shareStream = function() {
  var ch = CHANNELS[curIdx];
  var url = ch.url;
  if (navigator.share) {
    navigator.share({
      title: ch.name + " - Ao Vivo",
      text: "Assistindo " + ch.name + " ao vivo",
      url: url
    }).then(function() { closeCast(); })
      .catch(function() {});
  } else {
    // Fallback: copia para área de transferência
    navigator.clipboard.writeText(url).then(function() {
      showToast("Link copiado! Cole no VLC ou outro player");
      closeCast();
    }).catch(function() {
      showToast("Link: " + url);
    });
  }
};

// ── ABRIR NO VLC ──
window.openVLC = function() {
  var url = getCurrentStreamUrl();
  // URI scheme do VLC para Android/iOS
  var vlcUri = "vlc://" + url.replace("https://","").replace("http://","");
  window.location.href = vlcUri;
  closeCast();
  setTimeout(function() {
    // Se VLC não abriu, mostra o link
    showToast("Se o VLC não abriu, copie o link em Compartilhar");
  }, 1500);
};

/* ── PLAYER CONTROLS ── */
window.togglePlay = function() {
  var v = document.getElementById("video");
  if (v.paused) { v.play(); document.getElementById("playBtn").innerHTML="&#9646;&#9646;"; showToast("Reproduzindo"); }
  else { v.pause(); document.getElementById("playBtn").innerHTML="&#9654;"; showToast("Pausado"); }
};
window.toggleMute = function() {
  var v = document.getElementById("video");
  v.muted = !v.muted;
  document.getElementById("muteBtn").innerHTML = v.muted ? "&#128263;" : "&#128266;";
  showToast(v.muted ? "Mudo" : "Som ligado");
};
window.setVolume = function(val) {
  var v = document.getElementById("video");
  v.volume = parseFloat(val);
  v.muted = parseFloat(val) === 0;
  document.getElementById("muteBtn").innerHTML = parseFloat(val) === 0 ? "&#128263;" : "&#128266;";
};
window.toggleFS = function() {
  var w = document.getElementById("playerWrap");
  if (!document.fullscreenElement) {
    if (w.requestFullscreen) w.requestFullscreen();
    else if (w.webkitRequestFullscreen) w.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
};

document.getElementById("video").addEventListener("playing", function(){ document.getElementById("playBtn").innerHTML="&#9646;&#9646;"; });
document.getElementById("video").addEventListener("pause",   function(){ document.getElementById("playBtn").innerHTML="&#9654;"; });

function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove("show"); }, 1800);
}

/* ── INIT ── */


// ── WEB VIDEO CAST ──
window.castWebVideoCast = function() {
  var ch = CHANNELS[curIdx];
  var url = ch.url;
  closeCast();

  if (navigator.share) {
    navigator.share({
      title: ch.name + " - Ao Vivo",
      text: url,
      url: url
    }).catch(function(e) {
      if (e.name !== "AbortError") doCopyAndOpen(url);
    });
    return;
  }
  doCopyAndOpen(url);
};

function doCopyAndOpen(url) {
  var ta = document.createElement("textarea");
  ta.value = url;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  showToast("URL copiada! Abra o Web Video Cast e cole na barra de navegacao");
}


/* ══ AUTO-ATUALIZAÇÃO DE TOKENS ══════════════════════════════ */
var _TAPI = "https://app.megafrixapi.com/get_token_channel.php";
var _TCACHE = "mf_tok_v2";
var _TTTL = 2*60*60*1000;

function _slugFromUrl(u){var m=u&&u.match(/\/([^\/]+)\.m3u8/);return m?m[1]:null;}

function _fetchTok(slug,idx){
  return fetch(_TAPI+"?channel="+slug,{headers:{
    "User-Agent":"Mozilla/5.0 (Linux; Android 11; 220333QL Build/RKQ1.211001.001; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/145.0.7632.162 Mobile Safari/537.36",
    "Accept":"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
    "x-requested-with":"site.megaflixapp",
    "referer":"https://megaflix.lat/",
    "accept-language":"pt-BR,pt;q=0.9"
  }})
  .then(function(r){return r.text();})
  .then(function(t){
    // Padrão principal: URL fazoeli
    var m=t.match(/https?:\/\/canaiss\.fazoeli\.co\.za\/token\/[a-f0-9]+\/[^\s"'<>&]+\.m3u8/);
    // Fallback: stream=URL
    if(!m){var w=t.match(/stream=(https?:\/\/[^\s"'<>&]+\.m3u8)/);
      if(w){try{m=[decodeURIComponent(w[1])];}catch(e){m=[w[1]];}}}
    // Fallback 2: qualquer m3u8 na resposta
    if(!m){var a=t.match(/https?:\/\/[^\s"'<>&]+\.m3u8[^\s"'<>&]*/);if(a)m=a;}
    if(m&&m[0]){CHANNELS[idx].url=m[0];return true;}
    return false;
  }).catch(function(){return false;});
}

function _refreshToks(){
  var el=document.getElementById("tokenStatus"),done=0,tot=CHANNELS.length,bs=5;
  function run(s){
    if(s>=tot){_saveTC();if(el){el.textContent="✓ "+done+" canais";el.style.color="#4caf50";}setTimeout(function(){if(el)el.textContent="";},4000);return;}
    var ps=[];
    for(var i=s;i<Math.min(s+bs,tot);i++){(function(idx){
      var slug=CHANNELS[idx].id||_slugFromUrl(CHANNELS[idx].url);
      ps.push(_fetchTok(slug,idx).then(function(ok){if(ok)done++;if(el)el.textContent="↻ "+done+"/"+tot;}));
    })(i);}
    Promise.all(ps).then(function(){setTimeout(function(){run(s+bs);},250);});
  }
  if(el){el.textContent="↻ atualizando...";el.style.color="var(--muted)";}
  run(0);
}

function _saveTC(){try{localStorage.setItem(_TCACHE,JSON.stringify({ts:Date.now(),tokens:CHANNELS.map(function(c){return{id:c.id,url:c.url};})}));}catch(e){}}

function _loadTC(){
  try{
    var raw=localStorage.getItem(_TCACHE);if(!raw)return false;
    var c=JSON.parse(raw);if(!c||!c.ts||Date.now()-c.ts>_TTTL)return false;
    var map={};c.tokens.forEach(function(t){map[t.id]=t.url;});
    CHANNELS.forEach(function(ch){if(map[ch.id])ch.url=map[ch.id];});
    var age=Math.round((Date.now()-c.ts)/60000);
    var el=document.getElementById("tokenStatus");
    if(el){el.textContent="cache "+age+"min";el.style.color="var(--muted)";}
    setTimeout(function(){var e=document.getElementById("tokenStatus");if(e)e.textContent="";},3000);
    return true;
  }catch(e){return false;}
}

function initTokenRefresh(){
  // Carrega cache para ter algo imediato
  _loadTC();
  // SEMPRE busca tokens frescos em background ao abrir
  _refreshToks();
  // Renova a cada 2h
  setInterval(_refreshToks,_TTTL);
}

/* ══ CONTROLE REMOTO LG ════════════════════════════════════ */
document.addEventListener("keydown", function(e) {
  var k = e.keyCode;
  if(k===37||k===38||k===39||k===40||k===33||k===34||k===227||k===228){
    e.preventDefault(); e.stopPropagation();
  }
  if(k===39||k===228||k===427||k===33||k===175||k===85){
    nextChannel(); showOverlayControls();
  }
  else if(k===37||k===227||k===428||k===34||k===174||k===86){
    prevChannel(); showOverlayControls();
  }
  else if(k===38||k===447){
    var v=document.getElementById("video"); if(v)v.volume=Math.min(1,(v.volume||0)+0.1);
    showOverlayControls();
  }
  else if(k===40||k===448){
    var v=document.getElementById("video"); if(v)v.volume=Math.max(0,(v.volume||1)-0.1);
    showOverlayControls();
  }
  else if(k===13){
    e.preventDefault();
    var ov=document.getElementById("playerOverlay");
    if(ov&&ov.classList.contains("visible")) togglePlay();
    else showOverlayControls();
  }
  else if(k===461||k===8){
    e.preventDefault();
    var m=document.getElementById("chMenu");
    if(m&&m.classList.contains("open")) toggleMenu();
    else showOverlayControls();
  }
  else if(k===415){var v=document.getElementById("video");if(v)v.play().catch(function(){});}
  else if(k===19){var v=document.getElementById("video");if(v)v.pause();}
  else if(k===403||k===112){toggleMenu();}
  else if(k===404||k===113){toggleFS();}
  else if(k===405||k===114){nextChannel(); showOverlayControls();}
  else if(k===406||k===115){prevChannel(); showOverlayControls();}
  else if(k>=48&&k<=57){_digCh(k-48);}
  else if(k!==0&&k!==255){showToast("key="+k);}
}, true);

var _dcB="", _dcT=null;
function _digCh(d){
  clearTimeout(_dcT); _dcB+=String(d);
  showToast("Canal: "+_dcB);
  _dcT=setTimeout(function(){
    var num=parseInt(_dcB); _dcB="";
    var idx=CHANNELS.findIndex(function(c){return parseInt(c.num)===num;});
    if(idx!==-1) playChannel(idx); else showToast("Canal "+num+" nao encontrado");
  },1500);
}

document.body.setAttribute("tabindex","0");
document.body.focus();

window.addEventListener("load", function() {
  initTokenRefresh();
  playChannel(0);
  showOverlayControls();
});

})();
</script>
